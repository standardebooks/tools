<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 220 60">
	<title>The tolstoy.life logo.</title>
	<desc>The tolstoy.life wordmark in serif type.</desc>
	<style type="text/css">
		text{
			font-family: "Georgia", "Times New Roman", serif;
			fill: #000;
			text-anchor: middle;
		}

		.wordmark{
			font-size: 22px;
			letter-spacing: 1px;
		}

		.tagline{
			font-size: 9px;
			letter-spacing: 2px;
			fill: #555;
		}
	</style>
	<text class="wordmark" x="110" y="32">tolstoy.life</text>
	<text class="tagline" x="110" y="50">EBOOK EDITIONS</text>
</svg>
