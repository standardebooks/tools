name: Standard Ebooks toolset tests

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-python@v6
      with:
        python-version: '>=3.10.12'
    - name: Install Ubuntu packages
      run: |
        sudo apt update
        sudo apt install default-jre git python3-venv
    - name: Install pipx packages
      run: |
        pipx install .
        pipx inject standardebooks pylint==4.0.6 pyright==1.1.411 types-requests==2.33.0.20260518 types-setuptools==82.0.0.20260518 types-lxml==2026.2.16 pytest==9.1.1
    - name: Check type annotations with pyright
      run: $PIPX_HOME/venvs/standardebooks/bin/pyright --venvpath=$PIPX_HOME/venvs/ .
    - name: Check code with pylint
      run: $PIPX_HOME/venvs/standardebooks/bin/pylint .
    - name: Test with pytest
      run: $PIPX_HOME/venvs/standardebooks/bin/pytest
