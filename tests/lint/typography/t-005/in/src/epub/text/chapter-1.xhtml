		<section id="chapter-1" epub:type="chapter">
			<h2 epub:type="ordinal z3998:roman">I</h2>
			<!-- VALID 1, capitalized word italicized -->
			<p>He read the <i>Times</i> at breakfast.</p>
			<!-- VALID 2, entire phrase italicized -->
			<p>He read <i>the Gazette</i> at breakfast.</p>
			<!-- VALID 3, capitalized word after the newspaper name -->
			<p>He visited the Observer Building.</p>
			<!-- FAIL 1, Times not italicized -->
			<p>He read the Times at breakfast.</p>
			<!-- FAIL 2, Gazette not italicized -->
			<p>He read the Gazette at breakfast.</p>
			<!-- FAIL 3, Observer not italicized -->
			<p>He read the Observer at breakfast.</p>
			<!-- FAIL 4, Dispatch not italicized -->
			<p>He read the Dispatch at breakfast.</p>
		</section>
